<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI — Real-Time Threat Mitigator</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🛡️</span>
                <h1 class="text-xl font-bold tracking-wider text-emerald-400">PHISH<span class="text-gray-100">GUARD</span> <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20">AI MVP</span></h1>
            </div>
            <div class="text-sm text-gray-400 font-mono bg-gray-950 px-3 py-1.5 rounded border border-gray-800">
                STATUS: <span class="text-emerald-400 animate-pulse">SECURE RUNTIME</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-900 bg-gray-950 py-6 text-center text-sm text-gray-500 font-mono">
        PhishGuard AI Solo Edition &copy; 2026 
    </footer>

</body>
</html>
